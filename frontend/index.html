<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>TUUVO — Painel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- Tela de login -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="brand">
        <img class="brand-mark" src="assets/tuuvo-mark.png" alt="TUUVO" />
        <strong>TUUVO</strong>
      </div>
      <p class="login-subtitle">Entre para acessar o painel de conversas.</p>
      <form id="login-form">
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="login-email" required autocomplete="username" />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="login-senha" required autocomplete="current-password" />
        </div>
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" class="btn btn-block">Entrar</button>
      </form>
    </div>
  </div>

  <!-- App principal -->
  <div id="app" class="app" hidden>
    <div class="sidebar">
      <div class="brand">
        <img class="brand-mark" src="assets/tuuvo-mark.png" alt="TUUVO" />
        <strong>TUUVO</strong>
      </div>

      <div class="nav-section-label">Atendimento</div>
      <div class="nav-item" data-route="inbox">💬 Conversas</div>

      <div class="nav-section-label">Configuração</div>
      <div class="nav-item" data-route="departments">🗂️ Departamentos</div>
      <div class="nav-item" data-route="channels">📡 Canais</div>
      <div class="nav-item" data-route="builder">🎨 Widget Builder</div>
      <div class="nav-item" data-route="team">👥 Equipe</div>

      <div class="sidebar-footer">
        <div id="current-user"></div>
        <button id="logout-btn" class="link-btn">Sair</button>
      </div>
    </div>

    <div class="main" id="main-content">
      <!-- views injetadas via JS -->
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
