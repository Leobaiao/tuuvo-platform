<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>TUUVO — Painel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- Tela de login -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="brand">
        <img class="brand-mark" src="assets/tuuvo-mark.png" alt="TUUVO" />
        <strong>TUUVO</strong>
      </div>
      <p class="login-subtitle">Entre para acessar o painel de conversas.</p>
      <form id="login-form">
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="login-email" required autocomplete="username" />
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="password-wrapper">
            <input type="password" id="login-senha" required autocomplete="current-password" />
            <button type="button" class="btn-toggle-password" id="toggle-password" aria-label="Mostrar senha" tabindex="-1">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-eye-off" hidden><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" class="btn btn-block">Entrar</button>
      </form>
    </div>
  </div>

  <!-- App principal -->
  <div id="app" class="app" hidden>
    <div class="sidebar">
      <div class="brand">
        <img class="brand-mark" src="assets/tuuvo-mark.png" alt="TUUVO" />
        <strong>TUUVO</strong>
      </div>

      <div class="nav-section-label">Atendimento</div>
      <div class="nav-item" data-route="inbox">💬 Conversas</div>

      <div class="nav-section-label">Configuração</div>
      <div class="nav-item" data-route="departments">🗂️ Departamentos</div>
      <div class="nav-item" data-route="channels">📡 Canais</div>
      <div class="nav-item" data-route="builder">🎨 Widget Builder</div>
      <div class="nav-item" data-route="team">👥 Equipe</div>

      <div class="sidebar-footer">
        <div id="current-user"></div>
        <button id="logout-btn" class="link-btn">Sair</button>
      </div>
    </div>

    <div class="main" id="main-content">
      <!-- views injetadas via JS -->
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
